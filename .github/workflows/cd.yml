name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]   # must match CI workflow name exactly
    types:
      - completed

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository,
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -------------------------
      # FRONTEND IMAGE
      # -------------------------
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/spare-frontend:latest

      # -------------------------
      # BACKEND IMAGE
      # -------------------------
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/spare-backend:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # No need to decode or chmod manually; this action handles it in memory.
          script: |
            export PATH=$PATH:/usr/bin:/usr/local/bin
            # 1. Create the directory if it doesn't exist
            mkdir -p ~/spare
            echo "🔹 Logging into Docker Hub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | /usr/bin/docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 2. IMPORTANT: You must move your docker-compose.yml to the EC2.
            # If it's already there, we proceed:
            cd ~/spare
            echo "🔹 Pulling and Updating..."
            /usr/bin/docker compose pull
            /usr/bin/docker compose up -d
