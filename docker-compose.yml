version: "3.8"

services:

  client:
    ports:
      - "3000:80"

  server:
    ports:
      - "5000:9000"
    environment:
      - DB_HOST=db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
