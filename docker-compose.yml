services:
  client:
    image: seiddk/spare-frontend:latest  # <--- ADD THIS
    ports:
      - "3000:80"
    restart: always

  server:
    image: seiddk/spare-backend:latest   # <--- ADD THIS
    ports:
      - "5000:9000"
    environment:
      - DB_HOST=db
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
